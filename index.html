<!DOCTYPE html>
<html>
<head>
  <title>Smart Irrigation DCS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>SMART-IRRIGATION-DCS</h1>
  <div class="status running">SYSTEM ONLINE</div>
</div>

<div class="panel left">

  <h3>CONTROL PANEL</h3>

  <div class="section">

    <div class="card">
      <h4>System</h4>
      <select id="system">
        <option value="drip">Drip</option>
        <option value="sprinkler">Sprinkler</option>
      </select>
    </div>

    <div class="card">
      <h4>Water</h4>
      <input id="et0" type="number" placeholder="ET0 (mm/day)">
      <input id="kc" type="number" placeholder="Kc">
    </div>

    <div class="card">
      <h4>Field</h4>
      <input id="area" type="number" placeholder="Area (m²)">
      <input id="zones" type="number" placeholder="Zones">
    </div>

    <div class="card">
      <h4>Operation</h4>
      <input id="hours" type="number" placeholder="Hours/day">
    </div>

    <div class="card">
      <h4>Hydraulics</h4>
      <input id="length" type="number" placeholder="Pipe Length (m)">
      <input id="elevation" type="number" placeholder="Elevation (m)">
      <input id="velocity" type="number" placeholder="Velocity (m/s)">
    </div>

    <div class="card">
      <h4>Material</h4>
      <select id="material">
        <option value="pvc">PVC</option>
        <option value="hdpe">HDPE</option>
        <option value="steel">Steel</option>
      </select>
    </div>

  </div>

  <button class="run-btn" onclick="calculate()">RUN DESIGN</button>

</div>

  <!-- CENTER PANEL -->
  <div class="panel center">
    <h3>PROCESS</h3>

    <div class="box">
      <p>FLOW RATE</p>
      <span id="flow">0</span>
    </div>

    <div class="box">
      <p>HEAD LOSS</p>
      <span id="headloss">0</span>
    </div>

    <div class="box">
      <p>TDH</p>
      <span id="tdh">0</span>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel right">
    <h3>PUMP</h3>

    <div class="box">
      <p>POWER (kW)</p>
      <span id="power">0</span>
    </div>

    <div class="box">
      <p>PIPE DIAMETER</p>
      <span id="diameter">0</span>
    </div>

  </div>

</div>

<div class="footer">
  SYSTEM LOG: Ready...
</div>

<script src="main.js"></script>

</body>
</html>
