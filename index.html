<!DOCTYPE html>
<html>
<head>
  <title>Smart Irrigation DCS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>IRRIGATION DCS</h1>
  <div class="status running">SYSTEM ONLINE</div>
</div>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="panel left">
    <h3>INPUTS</h3>

    <label>System Type</label>
    <select id="system">
      <option value="drip">Drip</option>
      <option value="sprinkler">Sprinkler</option>
    </select>

    <label>Area (m²)</label>
    <input id="area" type="number">

    <label>ET0</label>
    <input id="et0" type="number">

    <label>Kc</label>
    <input id="kc" type="number">

    <label>Pipe Length (m)</label>
    <input id="length" type="number">

    <label>Elevation (m)</label>
    <input id="elevation" type="number">

    <label>Material</label>
    <select id="material">
      <option value="pvc">PVC</option>
      <option value="hdpe">HDPE</option>
      <option value="steel">Steel</option>
    </select>

    <button onclick="calculate()">RUN</button>
  </div>

  <!-- CENTER PANEL -->
  <div class="panel center">
    <h3>PROCESS</h3>

    <div class="box">
      <p>FLOW RATE</p>
      <span id="flow">0</span>
    </div>

    <div class="box">
      <p>HEAD LOSS</p>
      <span id="headloss">0</span>
    </div>

    <div class="box">
      <p>TDH</p>
      <span id="tdh">0</span>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel right">
    <h3>PUMP</h3>

    <div class="box">
      <p>POWER (kW)</p>
      <span id="power">0</span>
    </div>

    <div class="box">
      <p>PIPE DIAMETER</p>
      <span id="diameter">0</span>
    </div>

  </div>

</div>

<div class="footer">
  SYSTEM LOG: Ready...
</div>

<script src="main.js"></script>

</body>
</html>
